# =====================================================
# RSS-Post Docker Compose 配置（开发/测试环境）
# =====================================================
#
# 使用方式:
#   docker-compose up -d              # 启动所有服务
#   docker-compose up -d --build      # 重新构建并启动
#
# 零配置启动：直接 docker-compose up -d 即可
# 默认账号: test@example.com / password123
#
# =====================================================

services:
  # ===================================================
  # PostgreSQL 数据库
  # ===================================================
  postgres:
    image: postgres:16-alpine
    container_name: rss-post-db
    environment:
      POSTGRES_USER: rss_post
      POSTGRES_PASSWORD: rss_post_password
      POSTGRES_DB: rss_post
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rss_post"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - rss-post-network

  # ===================================================
  # Redis 缓存和队列
  # ===================================================
  redis:
    image: redis:7-alpine
    container_name: rss-post-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - rss-post-network

  # ===================================================
  # 数据库初始化服务
  # ===================================================
  init:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    container_name: rss-post-init
    environment:
      DATABASE_URL: postgresql://rss_post:rss_post_password@postgres:5432/rss_post
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        echo '=== Database Initialization ===' &&
        sleep 3 &&
        echo 'Running Prisma generate...' &&
        pnpm exec prisma generate &&
        echo 'Running database migrations...' &&
        pnpm exec prisma db push --accept-data-loss &&
        echo 'Seeding initial data...' &&
        pnpm exec tsx prisma/seed.ts &&
        echo '=== Initialization Complete ==='
      "
    volumes:
      - ./prisma:/app/prisma
    restart: "no"
    networks:
      - rss-post-network

  # ===================================================
  # 主应用服务
  # ===================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
      args:
        BUILD_MEMORY: 1536
        RUNTIME_MEMORY: 512
    image: rss-post-app:latest
    container_name: rss-post-app
    ports:
      - "8915:3000"
    environment:
      # 数据库
      DATABASE_URL: postgresql://rss_post:rss_post_password@postgres:5432/rss_post
      # Redis
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # 应用 URL
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:8915}
      APP_URL: ${APP_URL:-http://localhost:8915}
      # Cookie 安全设置
      SECURE_COOKIE: ${SECURE_COOKIE:-false}
      # 服务类型
      SERVICE_TYPE: app
      # AI 配置（启动后在界面中配置）
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      AI_MODEL: ${AI_MODEL:-gpt-4o}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      CUSTOM_API_BASE_URL: ${CUSTOM_API_BASE_URL:-}
      CUSTOM_API_KEY: ${CUSTOM_API_KEY:-}
      CUSTOM_API_MODEL: ${CUSTOM_API_MODEL:-}
      # 日志
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - rss-post-network

  # ===================================================
  # Feed Discovery Worker（OPML导入后自动发现和抓取）
  # ===================================================
  feed-discovery-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
      args:
        RUNTIME_MEMORY: 256
    container_name: rss-post-feed-discovery-worker
    environment:
      DATABASE_URL: postgresql://rss_post:rss_post_password@postgres:5432/rss_post
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: production
      SERVICE_TYPE: worker
      WORKER_TYPE: feed-discovery
      FEED_DISCOVERY_CONCURRENCY: "3"
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - rss-post-network

  # ===================================================
  # Preliminary Worker（文章初评 - 可选）
  # 开发环境默认不启动，生产环境建议启用
  # ===================================================
  # preliminary-worker:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #     target: worker
  #     args:
  #       RUNTIME_MEMORY: 384
  #   container_name: rss-post-preliminary-worker
  #   environment:
  #     DATABASE_URL: postgresql://rss_post:rss_post_password@postgres:5432/rss_post
  #     REDIS_URL: redis://redis:6379
  #     REDIS_HOST: redis
  #     REDIS_PORT: 6379
  #     NODE_ENV: production
  #     SERVICE_TYPE: worker
  #     WORKER_TYPE: preliminary
  #     PRELIMINARY_WORKER_CONCURRENCY: "5"
  #     AI_PROVIDER: ${AI_PROVIDER:-openai}
  #     OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  #     LOG_LEVEL: ${LOG_LEVEL:-info}
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #     init:
  #       condition: service_completed_successfully
  #   restart: unless-stopped
  #   networks:
  #     - rss-post-network

networks:
  rss-post-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

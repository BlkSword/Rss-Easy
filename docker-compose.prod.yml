# =====================================================
# RSS-Post Docker Compose 生产环境配置
# =====================================================
#
# 使用方式:
#   docker-compose -f docker-compose.prod.yml up -d
#   docker-compose -f docker-compose.prod.yml up -d --build  # 重新构建
#
# 环境变量配置:
#   创建 .env 文件并配置所有必要的环境变量
#   参考 .env.example 获取完整配置列表
#
# 架构说明:
#   - 主应用 (app): Next.js 前端 + API 服务
#   - Workers: 后台任务处理（独立容器，轻量级镜像）
#   - PostgreSQL: 数据库
#   - Redis: 缓存和队列
#
# =====================================================

services:
  # ===================================================
  # PostgreSQL 数据库
  # ===================================================
  postgres:
    image: postgres:16-alpine
    container_name: rss-post-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rss_post}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-rss_post}
      POSTGRES_INITDB_ARGS: "-E UTF8"
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rss_post}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    networks:
      - rss-post-network

  # ===================================================
  # Redis 缓存和队列
  # ===================================================
  redis:
    image: redis:7-alpine
    container_name: rss-post-redis
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD}
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "$$REDIS_PASSWORD", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - rss-post-network

  # ===================================================
  # 数据库初始化服务
  # ===================================================
  init:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    container_name: rss-post-init
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-rss_post}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-rss_post}?connection_limit=10&pool_timeout=20
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        echo '=== Database Initialization ===' &&
        echo 'Waiting for database...' &&
        sleep 3 &&
        echo 'Running Prisma generate...' &&
        pnpm exec prisma generate &&
        echo 'Running database migrations...' &&
        pnpm exec prisma db push --accept-data-loss &&
        echo 'Seeding initial data...' &&
        pnpm exec tsx prisma/seed.ts &&
        echo '=== Initialization Complete ==='
      "
    volumes:
      - ./prisma:/app/prisma
    networks:
      - rss-post-network

  # ===================================================
  # 主应用服务
  # ===================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
      args:
        BUILD_MEMORY: 1536
        RUNTIME_MEMORY: 512
        PNPM_CONCURRENCY: 4
    container_name: rss-post-app
    ports:
      - "8915:3000"
    environment:
      # 数据库
      DATABASE_URL: postgresql://${POSTGRES_USER:-rss_post}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-rss_post}?connection_limit=10&pool_timeout=20
      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # 认证
      JWT_SECRET: ${JWT_SECRET}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      APP_URL: ${APP_URL}
      # 加密
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      CRON_SECRET: ${CRON_SECRET}
      # 应用
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      SERVICE_TYPE: app
      # AI
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://localhost:11434}
      CUSTOM_API_BASE_URL: ${CUSTOM_API_BASE_URL}
      CUSTOM_API_KEY: ${CUSTOM_API_KEY}
      CUSTOM_API_MODEL: ${CUSTOM_API_MODEL}
      # AI-Native
      PRELIMINARY_MIN_VALUE: ${PRELIMINARY_MIN_VALUE:-3}
      REFLECTION_ENABLED: ${REFLECTION_ENABLED:-true}
      MAX_REFLECTION_ROUNDS: ${MAX_REFLECTION_ROUNDS:-2}
      # 邮件
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-RSS-Post}
      # 日志
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # 调度器
      SCHEDULER_AUTO_START: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - rss-post-network

  # ===================================================
  # Feed Discovery Worker（订阅源发现和首次抓取）
  # ===================================================
  feed-discovery-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
      args:
        RUNTIME_MEMORY: 256
        PNPM_CONCURRENCY: 4
    image: rss-post-worker:latest
    container_name: rss-post-feed-discovery-worker
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-rss_post}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-rss_post}?connection_limit=5&pool_timeout=20
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      NODE_ENV: ${NODE_ENV:-production}
      SERVICE_TYPE: worker
      WORKER_TYPE: feed-discovery
      FEED_DISCOVERY_CONCURRENCY: "3"
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - rss-post-network

  # ===================================================
  # Preliminary Worker（文章初评 - 过滤低质内容）
  # ===================================================
  preliminary-worker:
    image: rss-post-worker:latest
    container_name: rss-post-preliminary-worker
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-rss_post}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-rss_post}?connection_limit=5&pool_timeout=20
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      NODE_ENV: ${NODE_ENV:-production}
      SERVICE_TYPE: worker
      WORKER_TYPE: preliminary
      PRELIMINARY_WORKER_CONCURRENCY: "5"
      # AI 配置
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      CUSTOM_API_BASE_URL: ${CUSTOM_API_BASE_URL}
      CUSTOM_API_KEY: ${CUSTOM_API_KEY}
      CUSTOM_API_MODEL: ${CUSTOM_API_MODEL}
      # AI-Native
      PRELIMINARY_MIN_VALUE: ${PRELIMINARY_MIN_VALUE:-3}
      # 加密
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 384M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - rss-post-network

  # ===================================================
  # Deep Analysis Worker（深度 AI 分析）
  # ===================================================
  deep-analysis-worker:
    image: rss-post-worker:latest
    container_name: rss-post-deep-analysis-worker
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-rss_post}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-rss_post}?connection_limit=5&pool_timeout=20
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      NODE_ENV: ${NODE_ENV:-production}
      SERVICE_TYPE: worker
      WORKER_TYPE: deep-analysis
      DEEP_ANALYSIS_WORKER_CONCURRENCY: "2"
      # AI 配置
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      CUSTOM_API_BASE_URL: ${CUSTOM_API_BASE_URL}
      CUSTOM_API_KEY: ${CUSTOM_API_KEY}
      CUSTOM_API_MODEL: ${CUSTOM_API_MODEL}
      # AI-Native
      REFLECTION_ENABLED: ${REFLECTION_ENABLED:-true}
      MAX_REFLECTION_ROUNDS: ${MAX_REFLECTION_ROUNDS:-2}
      # 加密
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - rss-post-network

  # ===================================================
  # 数据库备份服务
  # ===================================================
  backup:
    image: postgres:16-alpine
    container_name: rss-post-backup
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rss_post}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-rss_post}
      POSTGRES_HOST: postgres
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: >
      sh -c "
        echo 'Backup schedule: 0 2 * * * (daily at 2 AM)' &&
        while true; do
          sleep 86400 &&
          DATE=$$(date +%Y%m%d_%H%M%S) &&
          pg_dump -U ${POSTGRES_USER:-rss_post} -h postgres ${POSTGRES_DB:-rss_post} | gzip > /backups/backup_$$DATE.sql.gz &&
          echo \"Backup completed: backup_$$DATE.sql.gz\" &&
          find /backups -name 'backup_*.sql.gz' -mtime +30 -delete
        done
      "
    networks:
      - rss-post-network

# =====================================================
# 网络配置
# =====================================================
networks:
  rss-post-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# =====================================================
# 数据卷配置
# =====================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

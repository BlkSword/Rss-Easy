# =====================================================
# RSS-Post Docker 镜像构建和推送
# =====================================================
#
# 触发条件：
#   - 推送到 main 分支
#   - 创建 tag (v*)
#   - 手动触发
#
# 输出镜像（推送到 GitHub Container Registry）：
#   - ghcr.io/<owner>/rss-post-app:latest
#   - ghcr.io/<owner>/rss-post-app:<tag>
#   - ghcr.io/<owner>/rss-post-worker:latest
#   - ghcr.io/<owner>/rss-post-worker:<tag>
#   - ghcr.io/<owner>/rss-post-init:latest
#   - ghcr.io/<owner>/rss-post-init:<tag>
#
# =====================================================

name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      push_images:
        description: 'Push images to registry'
        required: false
        default: 'true'
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_APP: ${{ github.repository_owner }}/rss-post-app
  IMAGE_NAME_WORKER: ${{ github.repository_owner }}/rss-post-worker
  IMAGE_NAME_INIT: ${{ github.repository_owner }}/rss-post-init

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_APP }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WORKER }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_INIT }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Detect system memory
        id: memory
        run: |
          TOTAL_MEM=$(free -m | awk '/^Mem:/{print $2}')
          if [ "$TOTAL_MEM" -ge 8192 ]; then
            echo "build_memory=3072" >> $GITHUB_OUTPUT
            echo "runtime_memory=768" >> $GITHUB_OUTPUT
          elif [ "$TOTAL_MEM" -ge 4096 ]; then
            echo "build_memory=2048" >> $GITHUB_OUTPUT
            echo "runtime_memory=512" >> $GITHUB_OUTPUT
          else
            echo "build_memory=1536" >> $GITHUB_OUTPUT
            echo "runtime_memory=384" >> $GITHUB_OUTPUT
          fi

      # 构建主应用镜像
      - name: Build and push App image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: app
          push: ${{ github.event.inputs.push_images != 'false' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_APP }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_APP }}:${{ github.sha }}
          build-args: |
            BUILD_MEMORY=${{ steps.memory.outputs.build_memory }}
            RUNTIME_MEMORY=${{ steps.memory.outputs.runtime_memory }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 构建 Worker 镜像
      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: worker
          push: ${{ github.event.inputs.push_images != 'false' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WORKER }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WORKER }}:${{ github.sha }}
          build-args: |
            RUNTIME_MEMORY=384
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 构建 Init 镜像（依赖层）
      - name: Build and push Init image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: deps
          push: ${{ github.event.inputs.push_images != 'false' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_INIT }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_INIT }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build summary
        run: |
          echo "## Docker Images Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| App | \`latest\`, \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Worker | \`latest\`, \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Init | \`latest\`, \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pull Commands" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_APP }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WORKER }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_INIT }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

# =====================================================
# RSS-Post Docker 镜像构建和推送
# =====================================================
#
# 触发条件：
#   - 推送到 main 分支
#   - 创建 tag (v*)
#   - 手动触发
#
# 输出镜像（推送到 GitHub Container Registry）：
#   - ghcr.io/<owner>/rss-post-app:latest
#   - ghcr.io/<owner>/rss-post-worker:latest
#   - ghcr.io/<owner>/rss-post-init:latest
#
# =====================================================

name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      push_images:
        description: 'Push images to registry'
        required: false
        default: 'true'
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 将用户名转换为小写（Docker 镜像名称要求）
      - name: Set lowercase image names
        id: images
        run: |
          OWNER="${{ github.repository_owner }}"
          OWNER_LC="${OWNER,,}"
          echo "app=ghcr.io/${OWNER_LC}/rss-post-app" >> $GITHUB_OUTPUT
          echo "worker=ghcr.io/${OWNER_LC}/rss-post-worker" >> $GITHUB_OUTPUT
          echo "init=ghcr.io/${OWNER_LC}/rss-post-init" >> $GITHUB_OUTPUT

      - name: Detect system memory
        id: memory
        run: |
          TOTAL_MEM=$(free -m | awk '/^Mem:/{print $2}')
          if [ "$TOTAL_MEM" -ge 8192 ]; then
            echo "build_memory=3072" >> $GITHUB_OUTPUT
            echo "runtime_memory=768" >> $GITHUB_OUTPUT
          elif [ "$TOTAL_MEM" -ge 4096 ]; then
            echo "build_memory=2048" >> $GITHUB_OUTPUT
            echo "runtime_memory=512" >> $GITHUB_OUTPUT
          else
            echo "build_memory=1536" >> $GITHUB_OUTPUT
            echo "runtime_memory=384" >> $GITHUB_OUTPUT
          fi

      # 构建主应用镜像
      - name: Build and push App image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: app
          push: ${{ github.event.inputs.push_images != 'false' }}
          tags: |
            ${{ steps.images.outputs.app }}:latest
            ${{ steps.images.outputs.app }}:${{ github.sha }}
          build-args: |
            BUILD_MEMORY=${{ steps.memory.outputs.build_memory }}
            RUNTIME_MEMORY=${{ steps.memory.outputs.runtime_memory }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 构建 Worker 镜像
      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: worker
          push: ${{ github.event.inputs.push_images != 'false' }}
          tags: |
            ${{ steps.images.outputs.worker }}:latest
            ${{ steps.images.outputs.worker }}:${{ github.sha }}
          build-args: |
            RUNTIME_MEMORY=384
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 构建 Init 镜像（依赖层）
      - name: Build and push Init image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: deps
          push: ${{ github.event.inputs.push_images != 'false' }}
          tags: |
            ${{ steps.images.outputs.init }}:latest
            ${{ steps.images.outputs.init }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build summary
        run: |
          echo "## Docker Images Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| App | \`latest\`, \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Worker | \`latest\`, \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Init | \`latest\`, \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pull Commands" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ steps.images.outputs.app }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ steps.images.outputs.worker }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ steps.images.outputs.init }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
